name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholders only; prisma generate / build do not need a live DB.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      NEXTAUTH_SECRET: ci-build-placeholder-secret-32chars-min
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
